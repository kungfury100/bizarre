name: Deploy to Zone

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: production
      url: https://bizarrelabs.one

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts
          echo "Scanning SSH host keys for ${{ secrets.HOST_SERVER_IP }}..."
          ssh-keyscan -t rsa,ecdsa,ed25519 -H "${{ secrets.HOST_SERVER_IP }}" >> ~/.ssh/known_hosts
          echo "Known hosts file contents:"
          cat ~/.ssh/known_hosts

      - name: Deploy dist to server
        run: |
          rsync -vrm --delete \
            -e "ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./dist/ \
            "${{ secrets.SSH_LOGIN_CREDS }}:/data01/virt115405/domeenid/www.bizarrelabs.one/htdocs"